<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CrossWord Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  /* Add your full CSS here from your previous snippet */
  /* For brevity, I assume your CSS above is included */
</style>
</head>
<body>

<header class="header">
  <div class="logo"><div class="logo-star"></div><span><span class="logo-cross">Cross</span><span class="logo-word">Word</span></span></div>
  <div class="hright">
    <div class="puzzle-badge" id="puzzleBadge">PUZZLE 1 / 4</div>
    <div class="stat-pill">
      <div class="stat-item"><span class="stat-label">Time</span><span class="stat-val" id="timer">00:00</span></div>
      <div class="stat-div"></div>
      <div class="stat-item"><span class="stat-label">Score</span><span class="stat-val" id="score">0</span></div>
    </div>
    <button class="btn-rules" id="rulesBtn">📖 Rules</button>
    <button class="btn-new" id="newGameBtn">✦ New Game</button>
  </div>
</header>

<main class="layout">
  <section class="grid-area">
    <div class="puzzle-title" id="puzzleTitle">Animals & Nature</div>
    <div class="grid-wrapper"><div class="cw-grid" id="cwGrid"></div></div>
    <div class="actions">
      <button class="abtn check" id="checkBtn">✓ Check</button>
      <button class="abtn hint" id="hintBtn">💡 Hint</button>
      <button class="abtn clear" id="clearBtn">✕ Clear</button>
      <button class="abtn reveal" id="revealBtn">👁 Reveal</button>
    </div>
  </section>
  <aside class="clues-area">
    <div class="cpanel"><div class="cheader">ACROSS</div><ul class="clist" id="acrossClues"></ul></div>
    <div class="cpanel"><div class="cheader">DOWN</div><ul class="clist" id="downClues"></ul></div>
  </aside>
</main>

<div class="modal-overlay" id="rulesModal">
  <div class="modal-box">
    <span class="modal-icon-big">📖</span>
    <h2 class="modal-title">How To Play</h2>
    <p class="modal-sub">Fill every box correctly to complete the puzzle!</p>
    <button class="btn-full" id="closeRulesBtn">Lets Play! 🎮</button>
  </div>
</div>

<div class="modal-overlay" id="winModal">
  <div class="win-box">
    <span class="trophy">🏆</span>
    <h2 class="win-title">Puzzle Complete!</h2>
    <p class="win-sub">You are a crossword champion!</p>
    <div class="win-stats">
      <div class="win-stat"><span id="ft">--:--</span><small>Time</small></div>
      <div class="win-stat"><span id="fs">0</span><small>Score</small></div>
      <div class="win-stat"><span id="fh">0</span><small>Hints</small></div>
    </div>
    <button class="btn-full" id="modalNewGame">Next Puzzle ✦</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const ALL_PUZZLES = [ /* your puzzles array goes here exactly as in your previous snippet */ ];

let currentPuzzle = 0;
let score = 0;
let hintsUsed = 0;
let timerInterval = null;
let seconds = 0;

const cwGrid = document.getElementById('cwGrid');
const puzzleTitle = document.getElementById('puzzleTitle');
const acrossClues = document.getElementById('acrossClues');
const downClues = document.getElementById('downClues');
const scoreEl = document.getElementById('score');
const timerEl = document.getElementById('timer');
const rulesModal = document.getElementById('rulesModal');
const winModal = document.getElementById('winModal');

function startTimer() {
  clearInterval(timerInterval);
  seconds = 0;
  timerInterval = setInterval(() => {
    seconds++;
    const mins = String(Math.floor(seconds/60)).padStart(2,'0');
    const secs = String(seconds%60).padStart(2,'0');
    timerEl.textContent = `${mins}:${secs}`;
  },1000);
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),1500);
}

function renderPuzzle() {
  const puzzle = ALL_PUZZLES[currentPuzzle];
  puzzleTitle.textContent = puzzle.title;
  cwGrid.innerHTML = '';
  acrossClues.innerHTML = '';
  downClues.innerHTML = '';
  
  const rows = puzzle.layout.length;
  const cols = puzzle.layout[0].length;
  cwGrid.style.gridTemplateRows = `repeat(${rows}, var(--cs))`;
  cwGrid.style.gridTemplateColumns = `repeat(${cols}, var(--cs))`;
  
  // Render grid
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const cell = document.createElement('div');
      cell.classList.add('cell');
      if(puzzle.layout[r][c]==='#') cell.classList.add('black');
      cell.dataset.row = r;
      cell.dataset.col = c;
      cell.dataset.value = puzzle.layout[r][c];
      
      const input = document.createElement('input');
      input.classList.add('cinp');
      if(puzzle.layout[r][c]!=='#') input.maxLength = 1;
      input.addEventListener('input', e=>{
        e.target.value = e.target.value.toUpperCase();
      });
      
      cell.appendChild(input);
      cwGrid.appendChild(cell);
    }
  }

  // Render clues
  puzzle.words.forEach(word=>{
    const li = document.createElement('li');
    li.textContent = `${word.number}. ${word.clue}`;
    if(word.direction==='across') acrossClues.appendChild(li);
    else downClues.appendChild(li);
  });
  
  score = 0;
  hintsUsed = 0;
  scoreEl.textContent = score;
  startTimer();
}

// Button actions
document.getElementById('rulesBtn').onclick = ()=>rulesModal.classList.add('show');
document.getElementById('closeRulesBtn').onclick = ()=>rulesModal.classList.remove('show');
document.getElementById('newGameBtn').onclick = ()=>{
  currentPuzzle = (currentPuzzle+1)%ALL_PUZZLES.length;
  renderPuzzle();
};
document.getElementById('modalNewGame').onclick = ()=>{
  winModal.classList.remove('show');
  currentPuzzle = (currentPuzzle+1)%ALL_PUZZLES.length;
  renderPuzzle();
};

document.getElementById('checkBtn').onclick = ()=>{
  const puzzle = ALL_PUZZLES[currentPuzzle];
  let correctCount = 0;
  puzzle.words.forEach(word=>{
    let allCorrect = true;
    for(let i=0;i<word.length;i++){
      const r = word.startRow + (word.direction==='down'?i:0);
      const c = word.startCol + (word.direction==='across'?i:0);
      const cell = cwGrid.querySelector(`.cell[data-row='${r}'][data-col='${c}'] input`);
      if(cell.value.toUpperCase()!==puzzle.layout[r][c]){
        allCorrect=false;
        cell.classList.add('wrong-letter');
      } else {
        cell.classList.remove('wrong-letter');
        cell.classList.add('correct-letter');
      }
    }
    if(!allCorrect) score = Math.max(score-5,0);
    else correctCount++;
  });
  scoreEl.textContent = score;
  if(correctCount===puzzle.words.length) showWin();
};

document.getElementById('hintBtn').onclick = ()=>{
  const puzzle = ALL_PUZZLES[currentPuzzle];
  for(let word of puzzle.words){
    for(let i=0;i<word.length;i++){
      const r = word.startRow + (word.direction==='down'?i:0);
      const c = word.startCol + (word.direction==='across'?i:0);
      const cell = cwGrid.querySelector(`.cell[data-row='${r}'][data-col='${c}'] input`);
      if(!cell.value){
        cell.value = puzzle.layout[r][c];
        cell.classList.add('hint-letter');
        hintsUsed++;
        score = Math.max(score-10,0);
        scoreEl.textContent = score;
        return;
      }
    }
  }
};

document.getElementById('clearBtn').onclick = ()=>{
  cwGrid.querySelectorAll('input').forEach(inp=>inp.value='');
};

document.getElementById('revealBtn').onclick = ()=>{
  const puzzle = ALL_PUZZLES[currentPuzzle];
  cwGrid.querySelectorAll('input').forEach((inp, idx)=>{
    const r = parseInt(inp.parentElement.dataset.row);
    const c = parseInt(inp.parentElement.dataset.col);
    if(puzzle.layout[r][c]!=='#') inp.value = puzzle.layout[r][c];
  });
  score = 0;
  scoreEl.textContent = score;
};

function showWin(){
  winModal.classList.add('show');
  document.getElementById('ft').textContent = timerEl.textContent;
  document.getElementById('fs').textContent = score;
  document.getElementById('fh').textContent = hintsUsed;
}

// Initialize
renderPuzzle();
</script>

</body>
</html>
